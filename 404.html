<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Hyperion Patrimoine</title>
  <meta name="robots" content="noindex" />
  <!-- GitHub Pages sert cette page pour n'importe quelle URL manquante (y compris
       des chemins imbriqués) : les liens doivent donc être absolus. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/hyperionpatrimoine/styles.css" />
</head>
<body>
  <main>
    <section class="hero" style="min-height: 100vh;">
      <div class="container hero__inner" style="text-align: center; max-width: 560px; margin-inline: auto;">
        <span class="eyebrow">Erreur 404</span>
        <h1 style="font-size: clamp(2.2rem, 5vw, 3.4rem);">Cette page n'existe pas <em>ou plus</em>.</h1>
        <p style="margin-inline: auto;">Le lien que vous avez suivi est peut-être obsolète, ou l'adresse a été mal saisie.</p>
        <div class="hero__actions" style="justify-content: center;">
          <a class="btn btn--gold" href="/hyperionpatrimoine/">Retour à l'accueil</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
